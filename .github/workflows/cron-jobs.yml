name: Todo Reminder Cron

on:
  schedule:
    - cron: '0 * * * *' # every hour (UTC)
  workflow_dispatch:

jobs:
  call-reminder-api:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call todo reminders endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${APP_BASE_URL:-}" ]; then
            echo "APP_BASE_URL secret is required (example: https://www.dilipdawadi.com.np)"
            exit 1
          fi

          REMINDER_URL="${APP_BASE_URL%/}/api/todos/reminders"

          if [ -n "${CRON_SECRET:-}" ]; then
            echo "Calling with cron authorization..."
            http_code=$(curl -sS -o response.txt -w "%{http_code}" \
              -X POST "$REMINDER_URL" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Accept: application/json")
          else
            echo "CRON_SECRET not set, calling without authorization header..."
            http_code=$(curl -sS -o response.txt -w "%{http_code}" \
              -X POST "$REMINDER_URL" \
              -H "Accept: application/json")
          fi

          echo "HTTP status: $http_code"
          cat response.txt || true

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Reminder API call failed."
            exit 1
          fi
